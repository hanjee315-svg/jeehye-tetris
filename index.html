<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>지혜의 테트리스 게임</title>
  <style>
    :root {
      --bg-gradient-start: #0f172a;
      --bg-gradient-end: #020617;
      --panel-bg: rgba(15, 23, 42, 0.95);
      --panel-border: #1e293b;
      --accent-color: #38bdf8;
      --accent-hover: #7dd3fc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      /* 모바일 터치 시 파란색 하이라이트 박스 제거 */
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, var(--bg-gradient-start), var(--bg-gradient-end));
      color: white;
      font-family: Arial, sans-serif;
      /* 스마트폰 터치 조작 시 화면 드래그 방지 */
      overflow-x: hidden;
    }

    .container {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      padding: 16px;
      max-width: 1200px;
      width: 100%;
      justify-content: center;
    }

    .game-panel,
    .side-panel {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }

    .game-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
      letter-spacing: -1px;
      text-align: center;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    canvas {
      display: block;
      background: #020617;
      border: 3px solid #334155;
      border-radius: 12px;
      max-width: 100%;
      height: auto;
    }

    .side-panel {
      width: 240px;
    }

    .score-box {
      margin-bottom: 20px;
      line-height: 1.9;
      color: var(--text-muted);
    }

    .score-box strong {
      float: right;
      color: white;
    }

    #next {
      width: 100px;
      height: 100px;
      margin-bottom: 20px;
    }

    .controls {
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .action-btn {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: none;
      border-radius: 12px;
      background: var(--accent-color);
      color: #020617;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .action-btn:hover {
      background: var(--accent-hover);
    }

    .message {
      margin-top: 14px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid #ef4444;
      color: #fecaca;
      text-align: center;
      display: none;
      width: 100%;
    }

    .leaderboard-list {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.8;
      max-height: 200px;
      overflow-y: auto;
    }

    /* 📱 모바일 가상 패드 스타일 */
    .mobile-pad {
      display: none; /* 기본적으로 데스크톱에선 숨김 */
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 320px;
      margin-top: 16px;
      user-select: none;
    }

    .pad-btn {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      aspect-ratio: 1 / 1;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .pad-btn:active {
      background: #334155;
      color: var(--accent-color);
    }

    .pad-btn.wide {
      grid-column: span 2;
      aspect-ratio: auto;
    }

    /* ----------------------------------------------------
       반응형 레이아웃 (스마트폰 최적화)
       ---------------------------------------------------- */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .game-panel {
        width: 100%;
        max-width: 340px;
        padding: 12px;
      }

      canvas#board {
        width: 100%; /* 화면 크기에 맞게 캔버스 압축 단, 비율 유지 */
      }

      .side-panel {
        width: 100%;
        max-width: 340px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        padding: 16px;
      }

      .side-panel h2, 
      .side-panel .controls {
        display: none; /* 모바일에서 불필요한 안내 텍스트 숨김 */
      }

      .side-panel > div:first-of-type {
        grid-column: span 1;
      }

      .side-panel > div:nth-of-type(2) {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      #next {
        margin-bottom: 0;
      }

      .side-panel button {
        grid-column: span 2;
        padding: 10px;
        font-size: 14px;
      }

      .side-panel > div:last-of-type {
        grid-column: span 2;
        margin-top: 0 !important;
      }

      .mobile-pad {
        display: grid; /* 모바일 디바이스 규격에서 활성화 */
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="game-panel">
      <h1>지혜의 테트리스 게임</h1>
      <canvas id="board" width="300" height="600"></canvas>
      <div id="message" class="message">게임 오버! 다시 시작을 눌러주세요.</div>
      
      <!-- 모바일 컨트롤러 패드 -->
      <div class="mobile-pad">
        <div class="pad-btn" id="btn-left">←</div>
        <div class="pad-btn" id="btn-rotate">↑</div>
        <div class="pad-btn" id="btn-right">→</div>
        <div class="pad-btn" id="btn-down">↓</div>
        <div class="pad-btn" id="btn-drop">Drop</div>
      </div>
    </div>

    <div class="side-panel">
      <div>
        <h2>상태</h2>
        <div class="score-box">
          점수 <strong id="score">0</strong><br />
          라인 <strong id="lines">0</strong><br />
          level <strong id="level">1</strong><br />
          상태 <strong id="status">진행중</strong>
        </div>
      </div>

      <div>
        <h2>다음 블록</h2>
        <canvas id="next" width="120" height="120"></canvas>
      </div>

      <div class="controls">
        ← → : 이동<br />
        ↓ : 빠르게 내리기<br />
        ↑ : 회전<br />
        Space : 바로 떨어뜨리기<br />
        P : 일시정지<br />
        R : 다시 시작
      </div>

      <button class="action-btn" onclick="togglePause()">일시정지 / 재개</button>
      <button class="action-btn" onclick="resetGame()">다시 시작</button>

      <div style="margin-top: 24px;">
        <h2>🏆 실시간 명예의 전당</h2>
        <div id="leaderboard" class="leaderboard-list">불러오는 중...</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      query,
      orderBy,
      limit,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ----------------------------------------------------
    // 0. GAME CONFIG & CONSTANTS
    // ----------------------------------------------------
    const GAME_SETTING = {
      COLS: 10,
      ROWS: 20,
      BLOCK_SIZE: 30,
      NEXT_BLOCK_SIZE: 20,
      BASE_SPEED: 850,
      SPEED_STEP: 70,
      MIN_SPEED: 100,
      LINES_PER_LEVEL: 10,
      SCORE_TABLE: [0, 100, 300, 500, 800]
    };

    const COLORS = {
      I: "#22d3ee", J: "#3b82f6", L: "#fb923c",
      O: "#fde047", S: "#4ade80", T: "#a855f7", Z: "#ef4444"
    };

    const SHAPES = {
      I: [[1, 1, 1, 1]],
      J: [[1, 0, 0], [1, 1, 1]],
      L: [[0, 0, 1], [1, 1, 1]],
      O: [[1, 1], [1, 1]],
      S: [[0, 1, 1], [1, 1, 0]],
      T: [[0, 1, 0], [1, 1, 1]],
      Z: [[1, 1, 0], [0, 1, 1]]
    };

    // ----------------------------------------------------
    // 1. FIREBASE SERVICE
    // ----------------------------------------------------
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function dbSaveScore(finalScore) {
      if (finalScore <= 0) return;
      
      // 닉네임 입력 대화상자 호출
      let nickname = prompt("축하합니다! 명예의 전당에 기록될 닉네임을 입력하세요 (최대 8자):");
      
      if (nickname === null) return; // 취소 누르면 저장 안 함
      nickname = nickname.trim().substring(0, 8);
      if (!nickname) nickname = "익명";

      try {
        await addDoc(collection(db, "leaderboard"), {
          name: nickname, // 인명 필드 구조화 변경
          score: finalScore,
          createdAt: Date.now()
        });
        dbLoadLeaderboard();
      } catch (error) {
        console.error("[Firebase Error] 랭킹 저장 실패:", error);
      }
    }

    async function dbLoadLeaderboard() {
      try {
        const q = query(
          collection(db, "leaderboard"),
          orderBy("score", "desc"),
          limit(10)
        );
        const snapshot = await getDocs(q);
        if (snapshot.empty) {
          document.getElementById("leaderboard").innerHTML = "기록이 없습니다.";
          return;
        }

        let html = "";
        let rank = 1;
        snapshot.forEach((doc) => {
          const data = doc.data();
          const displayName = data.name || "익명 플레이어";
          html += `${rank}. <b>${displayName}</b> — ${data.score}점<br>`;
          rank++;
        });
        document.getElementById("leaderboard").innerHTML = html;
      } catch (error) {
        console.error("[Firebase Error] 로드 실패:", error);
        document.getElementById("leaderboard").innerHTML = "랭킹 로드 실패";
      }
    }

    // ----------------------------------------------------
    // 2. GAME ENGINE STATE
    // ----------------------------------------------------
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const nextCanvas = document.getElementById("next");
    const nextCtx = nextCanvas.getContext("2d");

    let board;
    let piece;
    let nextPiece;
    let score;
    let lines;
    let level;
    let gameOver;
    let paused;
    let dropCounter;
    let lastTime;

    function createBoard() {
      return Array.from({ length: GAME_SETTING.ROWS }, () => Array(GAME_SETTING.COLS).fill(null));
    }

    function generateRandomPiece() {
      const types = Object.keys(SHAPES);
      const type = types[Math.floor(Math.random() * types.length)];
      return {
        type,
        shape: SHAPES[type].map(row => [...row]),
        color: COLORS[type],
        x: Math.floor(GAME_SETTING.COLS / 2) - 2,
        y: 0
      };
    }

    // ----------------------------------------------------
    // 3. RENDERING LOGIC
    // ----------------------------------------------------
    function renderBlock(context, x, y, color, size = GAME_SETTING.BLOCK_SIZE) {
      context.fillStyle = color;
      context.fillRect(x * size, y * size, size, size);
      context.strokeStyle = "rgba(255,255,255,0.18)";
      context.lineWidth = 2;
      context.strokeRect(x * size + 1, y * size + 1, size - 2, size - 2);
    }

    function renderBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#020617";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < GAME_SETTING.ROWS; y++) {
        for (let x = 0; x < GAME_SETTING.COLS; x++) {
          if (board[y][x]) {
            renderBlock(ctx, x, y, board[y][x]);
          } else {
            ctx.strokeStyle = "rgba(148, 163, 184, 0.08)";
            ctx.strokeRect(x * GAME_SETTING.BLOCK_SIZE, y * GAME_SETTING.BLOCK_SIZE, GAME_SETTING.BLOCK_SIZE, GAME_SETTING.BLOCK_SIZE);
          }
        }
      }
      renderPiece(ctx, piece);
    }

    function renderPiece(context, targetPiece, offsetX = 0, offsetY = 0, size = GAME_SETTING.BLOCK_SIZE) {
      targetPiece.shape.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) {
            renderBlock(
              context,
              targetPiece.x + x + offsetX,
              targetPiece.y + y + offsetY,
              targetPiece.color,
              size
            );
          }
        });
      });
    }

    function renderNextPiecePreview() {
      nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
      nextCtx.fillStyle = "#020617";
      nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

      const size = GAME_SETTING.NEXT_BLOCK_SIZE;
      const tempPreview = {
        ...nextPiece,
        x: Math.floor((5 - nextPiece.shape[0].length) / 2),
        y: Math.floor((5 - nextPiece.shape.length) / 2)
      };

      renderPiece(nextCtx, tempPreview, 0, 0, size);
    }

    // ----------------------------------------------------
    // 4. CORE ENGINE LOGIC
    // ----------------------------------------------------
    function checkCollision(testPiece, offsetX = 0, offsetY = 0, newShape = testPiece.shape) {
      for (let y = 0; y < newShape.length; y++) {
        for (let x = 0; x < newShape[y].length; x++) {
          if (!newShape[y][x]) continue;

          const newX = testPiece.x + x + offsetX;
          const newY = testPiece.y + y + offsetY;

          if (newX < 0 || newX >= GAME_SETTING.COLS || newY >= GAME_SETTING.ROWS) return true;
          if (newY >= 0 && board[newY][newX]) return true;
        }
      }
      return false;
    }

    function mergePieceToGrid() {
      piece.shape.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) {
            board[piece.y + y][piece.x + x] = piece.color;
          }
        });
      });
    }

    function processLineClears() {
      let cleared = 0;
      for (let y = GAME_SETTING.ROWS - 1; y >= 0; y--) {
        if (board[y].every(cell => cell)) {
          board.splice(y, 1);
          board.unshift(Array(GAME_SETTING.COLS).fill(null));
          cleared++;
          y++; 
        }
      }

      if (cleared > 0) {
        score += GAME_SETTING.SCORE_TABLE[cleared] * level;
        lines += cleared;
        level = Math.floor(lines / GAME_SETTING.LINES_PER_LEVEL) + 1;
      }
    }

    function spawnNextPiece() {
      piece = nextPiece;
      piece.x = Math.floor(GAME_SETTING.COLS / 2) - 2;
      piece.y = 0;
      nextPiece = generateRandomPiece();

      if (checkCollision(piece)) {
        handleGameOver();
      }
    }

    function movePiece(dx, dy) {
      if (paused || gameOver) return;

      if (!checkCollision(piece, dx, dy)) {
        piece.x += dx;
        piece.y += dy;
      } else if (dy > 0) {
        mergePieceToGrid();
        processLineClears();
        spawnNextPiece();
      }
    }

    function rotatePiece() {
      if (paused || gameOver) return;

      const rotatedShape = piece.shape[0].map((_, index) =>
        piece.shape.map(row => row[index]).reverse()
      );

      if (!checkCollision(piece, 0, 0, rotatedShape)) {
        piece.shape = rotatedShape;
      } else if (!checkCollision(piece, -1, 0, rotatedShape)) {
        piece.x -= 1;
        piece.shape = rotatedShape;
      } else if (!checkCollision(piece, 1, 0, rotatedShape)) {
        piece.x += 1;
        piece.shape = rotatedShape;
      }
    }

    function dropInstantly() {
      if (paused || gameOver) return;

      let distance = 0;
      while (!checkCollision(piece, 0, distance + 1)) {
        distance++;
      }
      piece.y += distance;
      score += distance * 2; 

      mergePieceToGrid();
      processLineClears();
      spawnNextPiece();
    }

    // ----------------------------------------------------
    // 5. GAMEFLOW & UI MANAGEMENT
    // ----------------------------------------------------
    function syncUiState() {
      document.getElementById("score").textContent = score;
      document.getElementById("lines").textContent = lines;
      document.getElementById("level").textContent = level;
      document.getElementById("status").textContent = gameOver
        ? "종료"
        : paused
          ? "정지"
          : "진행중";
    }

    function handleGameOver() {
      gameOver = true;
      document.getElementById("message").style.display = "block";
      syncUiState();
      
      // 약간의 딜레이를 주어 화면을 확인한 후 팝업이 뜨도록 유도
      setTimeout(() => {
        dbSaveScore(score);
      }, 300);
    }

    window.togglePause = function() {
      if (gameOver) return;
      paused = !paused;
      syncUiState();
    };

    window.resetGame = function() {
      board = createBoard();
      piece = generateRandomPiece();
      nextPiece = generateRandomPiece();
      score = 0;
      lines = 0;
      level = 1;
      gameOver = false;
      paused = false;
      dropCounter = 0;
      lastTime = 0;
      document.getElementById("message").style.display = "none";
      syncUiState();
      renderBoard();
      renderNextPiecePreview();
    };

    function gameLoop(time = 0) {
      const deltaTime = time - lastTime;
      lastTime = time;

      if (!paused && !gameOver) {
        dropCounter += deltaTime;
        const dropInterval = Math.max(
          GAME_SETTING.MIN_SPEED, 
          GAME_SETTING.BASE_SPEED - (level - 1) * GAME_SETTING.SPEED_STEP
        );

        if (dropCounter > dropInterval) {
          movePiece(0, 1);
          dropCounter = 0;
        }
      }

      renderBoard();
      renderNextPiecePreview();
      syncUiState();
      requestAnimationFrame(gameLoop);
    }

    // ----------------------------------------------------
    // 6. CONTROL EVENTS (KEYBOARD & MOBILE TOUCH)
    // ----------------------------------------------------
    // 데스크톱 키보드 바인딩
    document.addEventListener("keydown", event => {
      if (event.key === "ArrowLeft") movePiece(-1, 0);
      if (event.key === "ArrowRight") movePiece(1, 0);
      if (event.key === "ArrowDown") movePiece(0, 1);
      if (event.key === "ArrowUp") rotatePiece();
      if (event.code === "Space") {
        event.preventDefault(); 
        dropInstantly();
      }
      if (event.key.toLowerCase() === "p") togglePause();
      if (event.key.toLowerCase() === "r") resetGame();
    });

    // 스마트폰 가상 버튼 터치 바인딩 (스크롤/확대 오작동 캔슬 포함)
    const touchButtons = [
      { id: "btn-left", action: () => movePiece(-1, 0) },
      { id: "btn-right", action: () => movePiece(1, 0) },
      { id: "btn-rotate", action: () => rotatePiece() },
      { id: "btn-down", action: () => movePiece(0, 1) },
      { id: "btn-drop", action: () => dropInstantly() }
    ];

    touchButtons.forEach(btn => {
      const element = document.getElementById(btn.id);
      if (element) {
        element.addEventListener("touchstart", (e) => {
          e.preventDefault(); // 더블캡 확대 및 뷰포트 바운스 캔슬
          btn.action();
        }, { passive: false });
      }
    });

    // 엔진 부트스트랩
    dbLoadLeaderboard();
    resetGame();
    gameLoop();
  </script>
</body>
</html>
